name: fuel_arena
description: A competitive driving platform where fuel efficiency becomes a game.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.9
  fl_chart: ^1.2.0
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^22.0.0
  flutter_secure_storage: ^10.3.1
  flutter_riverpod: ^3.3.1
  geolocator: ^14.0.2
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  google_mobile_ads: ^8.0.0
  in_app_purchase: ^3.3.0
  intl: ^0.20.2
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.14.1
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
    - assets/data/
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-VF.ttf
